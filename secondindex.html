<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triple Destino de Nox</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Fauna+One&display=swap" rel="stylesheet">
    <style>
        #nox-quiz-container, #nox-quiz-container * { box-sizing: border-box; }

        #nox-quiz-container {
            --gold: #c9a44c;
            --dark-bg: #131314;
            --panel-bg: #1e1e1f;
            --text-color: #e0d9c1;
            --rarity-common: #b0c3d9;
            --rarity-rare: #4b69ff;
            --rarity-epic: #8847ff;
            --rarity-legendary: #d32ce6;
            --rarity-ancient: #eb4b4b;
            
            font-family: 'Fauna One', serif;
            color: var(--text-color);
            background: var(--dark-bg);
            padding: 40px 25px;
            border: 2px solid var(--gold);
            border-radius: 12px;
            max-width: 650px;
            margin: 20px auto;
            box-shadow: 0 15px 45px rgba(0,0,0,0.9);
            position: relative;
            overflow: hidden;
        }

        .progress-container { width: 100%; height: 5px; background: #333; position: absolute; top: 0; left: 0; }
        #progress-bar { height: 100%; background: var(--gold); width: 0%; transition: width 0.5s ease; }

        .noble-title { font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 3px; color: var(--gold); margin-bottom: 15px; text-align: center; }
        .divider { height: 2px; background: linear-gradient(to right, transparent, var(--gold), transparent); margin: 25px 0; }

        /* Form */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; color: var(--gold); margin-bottom: 5px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        select, input {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.6);
            border: 1px solid rgba(201,164,76,0.3); color: var(--text-color);
            border-radius: 4px; outline: none; font-family: inherit;
        }

        .quiz-btn {
            display: block; width: 100%; padding: 16px;
            background: rgba(201, 164, 76, 0.05); border: 1px solid rgba(201, 164, 76, 0.3);
            color: var(--text-color); font-family: 'Cinzel', serif; cursor: pointer;
            transition: all 0.3s ease; border-radius: 6px; text-align: center; text-transform: uppercase; letter-spacing: 1px;
        }
        .quiz-btn:hover { background: var(--gold); color: #1a1a1b; }
        .main-action { background: var(--gold); color: #1a1a1b; font-weight: bold; margin-top: 20px; font-size: 1.1rem; }

        /* Roulette */
        .roulette-container { margin-bottom: 15px; text-align: left; }
        .roulette-label { font-size: 0.6rem; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; display: block; }
        .roulette-wrapper {
            position: relative; height: 80px; background: #000;
            border: 1px solid #333; overflow: hidden; display: flex; align-items: center; box-shadow: inset 0 0 15px rgba(0,0,0,1);
        }
        .roulette-strip { display: flex; position: absolute; left: 0; height: 100%; transition: transform 7s cubic-bezier(0.1, 0.8, 0.1, 1); }
        .roulette-item {
            min-width: 70px; height: 100%; display: flex; align-items: center; justify-content: center;
            font-family: 'Cinzel'; font-size: 1.1rem; color: #444; border-right: 1px solid #111; position: relative;
        }
        .roulette-item::after { content: ''; position: absolute; bottom: 0; width: 100%; height: 3px; background: var(--rarity-common); }
        .item-rare::after { background: var(--rarity-rare); }
        .item-epic::after { background: var(--rarity-epic); }
        .item-legendary::after { background: var(--rarity-legendary); }
        .item-ancient::after { background: var(--rarity-ancient); }
        .marker { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #ff4d4d; z-index: 10; transform: translateX(-50%); box-shadow: 0 0 10px #ff4d4d; }

        /* Results Tab System */
        .tab-switcher { display: flex; gap: 8px; margin-bottom: 25px; }
        .tab-btn {
            flex: 1; padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(201,164,76,0.2);
            color: var(--gold); cursor: pointer; font-family: 'Cinzel'; font-size: 0.75rem; border-radius: 4px; transition: 0.3s;
        }
        .tab-btn.active { background: var(--gold); color: #1a1a1b; font-weight: bold; border-color: var(--gold); box-shadow: 0 0 15px rgba(201,164,76,0.3); }

        /* Stats Display */
        .stats-display-row {
            display: flex; justify-content: space-between; align-items: center;
            margin: 30px 0; gap: 10px;
        }
        
        .stat-side-container { flex: 1; display: flex; flex-direction: column; gap: 10px; }

        .stat-side {
            width: 100%; display: flex; flex-direction: column; align-items: center;
            background: linear-gradient(135deg, #1e1e1f, #0a0a0a);
            padding: 10px 2px; border-radius: 8px; border: 1px solid rgba(201,164,76,0.15);
        }
        .stat-side .val { font-family: 'Cinzel'; font-size: 1.4rem; color: #fff; line-height: 1; margin-bottom: 2px; }
        .stat-side .lbl { font-size: 0.55rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }

        #score-center {
            flex: 1.8; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #252526 0%, #000 100%);
            height: 140px; border: 4px solid var(--gold); border-radius: 50%;
            box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(201,164,76,0.2);
        }
        #score-center .score-num { font-size: 4rem; font-family: 'Cinzel'; line-height: 1; text-shadow: 0 0 15px rgba(0,0,0,0.5); }
        #score-center .score-lbl { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; position: absolute; bottom: 25px; color: var(--gold); }

        .info-header-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .info-pill { background: rgba(0,0,0,0.4); border: 1px solid rgba(201,164,76,0.1); padding: 10px; border-radius: 6px; }
        .info-pill label { font-size: 0.55rem; color: var(--gold); display: block; opacity: 0.7; margin-bottom: 2px; }
        .info-pill span { font-family: 'Cinzel'; font-size: 0.9rem; color: #fff; }

        .trait-card {
            background: #1a1a1b; border: 1px solid rgba(201,164,76,0.15);
            padding: 15px; margin-bottom: 12px; border-radius: 8px; text-align: left;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .trait-header { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(201,164,76,0.2); padding-bottom: 6px; margin-bottom: 8px; }
        .trait-title { font-family: 'Cinzel'; color: var(--gold); font-size: 0.9rem; font-weight: bold; }
        .trait-tag { font-size: 0.65rem; text-transform: uppercase; background: var(--gold); color: #1a1a1b; padding: 2px 8px; border-radius: 3px; font-weight: bold; }

        .hidden { display: none !important; }
        .fade-in { animation: noxIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        @keyframes noxIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div id="nox-quiz-container">
    <div class="progress-container"><div id="progress-bar"></div></div>

    <!-- PESTAÑA 1: CONFIGURACIÓN -->
    <div id="step-creation" class="fade-in">
        <h2 class="noble-title">Rito de Sex Appeal</h2>
        <div class="divider"></div>

        <div class="input-group">
            <label>Linaje del Sujeto</label>
            <select id="race-select" onchange="adaptForm()">
                <optgroup label="Anomalías">
                    <option value="goblin">Goblin (Solo Hembras)</option>
                    <option value="plasmoid">Plasmoide (Amorfo)</option>
                    <option value="myko">Myko (Fúngico)</option>
                </optgroup>
                <optgroup label="Bestias">
                    <option value="grung">Grung</option>
                    <option value="leporino">Leporino</option>
                    <option value="tabaxi">Tabaxi</option>
                    <option value="tauro">Tauro</option>
                </optgroup>
                <optgroup label="Acuáticos / Voladores">
                    <option value="leviath">Leviath</option>
                    <option value="aarakocra">Aarakocra</option>
                    <option value="behero">Behero</option>
                    <option value="kenku">Kenku</option>
                </optgroup>
                <optgroup label="Dragones">
                    <option value="draconido">Dracónido</option>
                    <option value="kobold">Kobold</option>
                </optgroup>
            </select>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="input-group" style="flex:1;">
                <label>Sexo</label>
                <select id="gender-select"></select>
            </div>
            <div class="input-group" style="flex:1;">
                <label>Orientación</label>
                <select id="orient-select">
                    <option value="hetero">Hetero</option>
                    <option value="homo">Homo</option>
                    <option value="bi">Bi</option>
                    <option value="pan">Pan</option>
                    <option value="ace">Asexual</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label>Categoría de Altura</label>
            <select id="height-select"></select>
        </div>

        <div class="divider" style="margin: 15px 0;"></div>

        <div class="input-group">
            <label>Estadística de Bono Principal</label>
            <select id="stat-bonus-select" onchange="updateStatVisibility()">
                <option value="str">Fuerza</option>
                <option value="con">Constitución</option>
                <option value="cha" selected>Carisma</option>
            </select>
        </div>

        <div id="stat-input-container" class="input-group">
            <!-- Dinámico por JS -->
        </div>

        <button onclick="startRito()" class="quiz-btn main-action">Realizar Triple Tirada</button>
    </div>

    <!-- PESTAÑA 2: ANIMACIÓN -->
    <div id="step-roulette" class="hidden text-center fade-in">
        <h2 class="noble-title">Tres Destinos</h2>
        <div class="divider"></div>
        
        <div class="roulette-container">
            <span class="roulette-label">Destino A</span>
            <div class="roulette-wrapper"><div class="marker"></div><div id="strip-1" class="roulette-strip"></div></div>
        </div>
        <div class="roulette-container">
            <span class="roulette-label">Destino B</span>
            <div class="roulette-wrapper"><div class="marker"></div><div id="strip-2" class="roulette-strip"></div></div>
        </div>
        <div class="roulette-container">
            <span class="roulette-label">Destino C</span>
            <div class="roulette-wrapper"><div class="marker"></div><div id="strip-3" class="roulette-strip"></div></div>
        </div>
        <p style="color: var(--gold); font-family: 'Cinzel'; font-size: 0.7rem; letter-spacing: 3px; margin-top: 20px;">Calculando potencial biológico...</p>
    </div>

    <!-- PESTAÑA 3: RESULTADOS -->
    <div id="step-results" class="hidden fade-in text-center">
        <div class="tab-switcher">
            <button class="tab-btn active" id="btn-tab-0" onclick="switchTab(0)">Destino A</button>
            <button class="tab-btn" id="btn-tab-1" onclick="switchTab(1)">Destino B</button>
            <button class="tab-btn" id="btn-tab-2" onclick="switchTab(2)">Destino C</button>
        </div>

        <div id="tab-content">
            <div class="info-header-grid">
                <div class="info-pill"><label>Raza</label><span id="res-race"></span></div>
                <div class="info-pill"><label>Sexo</label><span id="res-gender"></span></div>
                <div class="info-pill"><label>Altura</label><span id="res-height"></span></div>
                <div class="info-pill"><label>Orientación</label><span id="res-orient"></span></div>
            </div>

            <div class="stats-display-row">
                <div class="stat-side-container">
                    <div class="stat-side">
                        <span class="val" id="mod-str"></span>
                        <span class="lbl">Fuerza</span>
                    </div>
                    <div class="stat-side">
                        <span class="val" id="mod-con"></span>
                        <span class="lbl">Const.</span>
                    </div>
                </div>
                
                <div id="score-center">
                    <span id="res-score" class="score-num"></span>
                    <span class="score-lbl">Appeal</span>
                </div>

                <div class="stat-side-container">
                    <div class="stat-side" style="height: 100%; justify-content: center;">
                        <span class="val" id="mod-cha" style="font-size: 2.2rem;"></span>
                        <span class="lbl">Carisma</span>
                    </div>
                </div>
            </div>

            <div id="res-perks"></div>
        </div>

        <button onclick="location.reload()" class="quiz-btn" style="width: auto; padding: 12px 50px; margin-top: 30px; font-size: 0.8rem;">Reiniciar Rito</button>
    </div>
</div>

<script>
    const races = {
        goblin: { name: "Goblin", genders: ["female"], heights: ["Pequeño"], mod: +1 },
        plasmoid: { name: "Plasmoide", genders: ["female", "male", "none"], heights: ["Pequeño", "Mediano"], mod: 0 },
        myko: { name: "Myko", genders: ["none", "female", "male"], heights: ["Pequeño", "Mediano"], mod: 0 },
        grung: { name: "Grung", genders: ["female", "male"], heights: ["Pequeño"], mod: 0 },
        leporino: { name: "Leporino", genders: ["female", "male"], heights: ["Pequeño", "Mediano"], mod: 0 },
        tabaxi: { name: "Tabaxi", genders: ["female", "male"], heights: ["Mediano"], mod: +2 },
        tauro: { name: "Tauro", genders: ["female", "male"], heights: ["Pequeño", "Mediano"], mod: 0 },
        leviath: { name: "Leviath", genders: ["female", "male"], heights: ["Pequeño", "Mediano"], mod: 0 },
        aarakocra: { name: "Aarakocra", genders: ["female", "male"], heights: ["Mediano"], mod: 0 },
        draconido: { name: "Dracónido", genders: ["female", "male"], heights: ["Pequeño", "Mediano"], mod: +1 },
        kobold: { name: "Kobold", genders: ["female", "male"], heights: ["Pequeño"], mod: 0 }
    };

    let rollResults = [];
    let statsUsed = { str: 10, con: 10, cha: 10 };

    function adaptForm() {
        const raceKey = document.getElementById('race-select').value;
        const race = races[raceKey];
        const gSel = document.getElementById('gender-select');
        const hSel = document.getElementById('height-select');
        gSel.innerHTML = race.genders.map(g => `<option value="${g}">${g==='female'?'Hembra':g==='male'?'Macho':'Amorfo'}</option>`).join('');
        hSel.innerHTML = race.heights.map(h => `<option value="${h}">${h}</option>`).join('');
    }

    function updateStatVisibility() {
        const bonusStat = document.getElementById('stat-bonus-select').value;
        const container = document.getElementById('stat-input-container');
        const labelText = bonusStat === 'str' ? 'Valor de Fuerza' : bonusStat === 'con' ? 'Valor de Constitución' : 'Valor de Carisma';
        
        container.innerHTML = `
            <label>${labelText}</label>
            <input type="number" id="main-stat-input" value="10" min="1" max="30" style="text-align:center; font-size: 1.2rem; border-color: var(--gold);">
            <p style="font-size: 0.6rem; color: var(--gold); margin-top: 5px; opacity: 0.8;">Cada punto sobre 10 otorga un peso de +10 a la escala de destino.</p>
        `;
    }

    function getDndMod(val) {
        const mod = Math.floor((val - 10) / 2);
        return (mod >= 0 ? "+" : "") + mod;
    }

    function startRito() {
        const bonusStat = document.getElementById('stat-bonus-select').value;
        const mainVal = parseInt(document.getElementById('main-stat-input').value);
        const rKey = document.getElementById('race-select').value;

        // Reset and set stats
        statsUsed = { str: 10, con: 10, cha: 10 };
        statsUsed[bonusStat] = mainVal;

        rollResults = [];
        for(let i=0; i<3; i++) {
            // Tirada favorecida (Roll 2 d80, take high)
            let r1 = Math.floor(Math.random() * 80) + 1;
            let r2 = Math.floor(Math.random() * 80) + 1;
            let raw = Math.max(r1, r2);

            // Bono solicitado: 10 puntos por cada punto sobre 10
            let statBono = (mainVal - 10) * 10;
            
            // Para mantener el equilibrio en una escala de 100, el peso de la estadística 
            // se suma al resultado bruto. Esto hace que un 20 garantice casi siempre resultados altos.
            let finalScore = raw + (statBono / 4); // Ajuste de factor 4 para no romper el techo de 100 de forma absurda
            
            // Bono racial
            finalScore += (races[rKey].mod * 5);
            
            rollResults.push(Math.min(100, Math.max(1, Math.round(finalScore))));
        }

        document.getElementById('step-creation').classList.add('hidden');
        document.getElementById('step-roulette').classList.remove('hidden');
        document.getElementById('progress-bar').style.width = "50%";

        setupRoulette('strip-1', rollResults[0]);
        setupRoulette('strip-2', rollResults[1]);
        setupRoulette('strip-3', rollResults[2]);

        setTimeout(showResults, 7500);
    }

    function setupRoulette(stripId, winnerVal) {
        const strip = document.getElementById(stripId);
        strip.innerHTML = '';
        for(let i=0; i<100; i++) {
            const div = document.createElement('div');
            div.className = 'roulette-item';
            const val = i === 90 ? winnerVal : Math.floor(Math.random() * 100) + 1;
            if(val > 90) div.classList.add('item-ancient');
            else if(val > 80) div.classList.add('item-legendary');
            else if(val > 60) div.classList.add('item-epic');
            else if(val > 40) div.classList.add('item-rare');
            div.innerText = val;
            strip.appendChild(div);
        }
        setTimeout(() => {
            const itemWidth = 70;
            const containerWidth = strip.parentElement.offsetWidth;
            const offset = (90 * itemWidth) - (containerWidth / 2) + (itemWidth / 2);
            strip.style.transform = `translateX(-${offset}px)`;
        }, 100);
    }

    function showResults() {
        document.getElementById('step-roulette').classList.add('hidden');
        document.getElementById('step-results').classList.remove('hidden');
        document.getElementById('progress-bar').style.width = "100%";
        switchTab(0);
    }

    function switchTab(idx) {
        document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
        
        const score = rollResults[idx];
        const rKey = document.getElementById('race-select').value;
        const gen = document.getElementById('gender-select').value;
        const ori = document.getElementById('orient-select').value;
        const hei = document.getElementById('height-select').value;
        const race = races[rKey];

        document.getElementById('res-race').innerText = race.name;
        document.getElementById('res-gender').innerText = gen==='female'?'Hembra':gen==='male'?'Macho':'Amorfo';
        document.getElementById('res-height').innerText = hei;
        document.getElementById('res-orient').innerText = ori.toUpperCase();
        
        document.getElementById('mod-str').innerText = getDndMod(statsUsed.str);
        document.getElementById('mod-con').innerText = getDndMod(statsUsed.con);
        document.getElementById('mod-cha').innerText = getDndMod(statsUsed.cha);
        document.getElementById('res-score').innerText = score;

        const center = document.getElementById('score-center');
        let col = '#b0c3d9';
        if(score > 90) col = '#eb4b4b'; else if(score > 80) col = '#d32ce6'; else if(score > 60) col = '#8847ff'; else if(score > 40) col = '#4b69ff';
        center.style.borderColor = col; 
        center.style.color = col;
        center.style.boxShadow = `0 0 50px ${col}44, inset 0 0 25px ${col}22`;

        let p = "";
        const isAnomaly = (rKey === 'plasmoid' || rKey === 'myko');

        // Proporciones
        if ((gen === 'female' || rKey === 'goblin') && !isAnomaly) {
            const m = score < 35 ? "AA/A" : score < 55 ? "B/C" : score < 75 ? "D/DD" : score < 92 ? "E/F" : "G/H+";
            p += createPerk("Tamaño de Pechos", "Físico", `Clasificación: Copa ${m}`);
        } else if (gen === 'male' && !isAnomaly) {
            p += createPerk("Tamaño de Miembro", "Físico", `${(score/4).toFixed(1)} cm de longitud basal.`);
        }

        // Motherly Production
        if (!isAnomaly && (gen === 'female' || rKey === 'goblin') && score >= 60) {
            let bonus = score >= 90 ? 3 : score >= 80 ? 2 : 1;
            p += createPerk(`Motherly Production [+${bonus}]`, "Rasgo Bio", `Tu organismo genera una sustancia regenerativa. Recolección: Obtienes dosis iguales a la mitad de tu Competencia + ${bonus} frascos extra. Curación: Recupera HP igual a tu Competencia + ${bonus}.`);
        }

        // Emanación Nutriente
        if (isAnomaly && score >= 60) {
            let bonus = score >= 90 ? 3 : score >= 80 ? 2 : 1;
            p += createPerk(`Gel Production [+${bonus}]`, "Rasgo Bio", `Tu superficie secreta una película nutriente. Recolección: Raspas de tu cuerpo dosis iguales a la mitad de tu Competencia + ${bonus} extra. Curación: Recupera HP igual a tu Competencia + ${bonus}.`);
        }

        if (rKey === 'tabaxi') p += createPerk("Seductive Claws", "Racial", "Ventaja en las pruebas de Carisma (Persuasión) al realizar contacto físico.");

        if (gen === 'female' || rKey === 'goblin') p += createPerk("Heat", "Racial", "Ventaja en las pruebas de Carisma (Persuasión y Interpretación) al hablar con criaturas de la misma especie. Siempre puedes ser embarazada en todo momento.");
        if (gen === 'female' || rKey === 'leporino') p += createPerk("Heat", "Racial", "Ventaja en las pruebas de Carisma (Persuasión y Interpretación) al hablar con criaturas de la misma especie. Siempre puedes ser embarazada en todo momento.");
        if (gen === 'female' || rKey === 'tauro') p += createPerk("Over Lactant", "Racial", "Si obtienes acceso a Motherly Production gracias a la tirada de Sex Appeal; obtienes un bono a la curación de +1.");
        
        document.getElementById('res-perks').innerHTML = p;
    }

    function createPerk(t, ty, tx) {
        return `<div class="trait-card fade-in"><div class="trait-header"><span class="trait-title">${t}</span><span class="trait-tag">${ty}</span></div><p style="font-size: 0.8rem; margin: 0; color: #bbb; line-height: 1.4;">${tx}</p></div>`;
    }

    adaptForm();
    updateStatVisibility();
</script>

</body>
</html>
