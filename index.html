<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Atlas Widget</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quattrocento:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --gold:#c5a059;
      --gold-bright:#f4d03f;
      --bg-black:#0a0a0b;
      --card-bg:#121214;
      --text-gray:#b0b0b0;
      --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:transparent;color:#eee;font-family:'Quattrocento', serif}
    #atlas-widget{
      display:flex;
      width:100%;
      max-width:1100px;
      height:700px;
      background:var(--bg-black);
      border:1px solid #222;
      margin:24px auto;
      overflow:hidden;
      border-radius:12px;
      box-shadow:0 30px 60px rgba(0,0,0,0.8);
    }

    .badges-viewport{
      flex:1.2;
      position:relative;
      background-color:#0d0d0f;
      background-image:
        radial-gradient(circle at center,#1a1a1e 0%,#0a0a0b 100%),
        linear-gradient(rgba(197,160,89,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(197,160,89,0.02) 1px, transparent 1px);
      background-size:100% 100%,50px 50px,50px 50px;
      display:flex;
      flex-direction:column;
      justify-content:space-around;
      align-items:center;
      padding:40px;
    }

    .badge-item{
      width:100%;
      max-width:320px;
      height:140px;
      cursor:pointer;
      position:relative;
      display:flex;
      align-items:center;
      padding:20px;
      border:1px solid rgba(197,160,89,0.2);
      background:rgba(197,160,89,0.02);
      transition:var(--transition);
      border-radius:4px;
      outline:none;
      user-select:none;
    }
    .badge-item:focus{box-shadow:0 0 0 3px rgba(197,160,89,0.12)}
    .badge-item:hover{border-color:var(--gold);background:rgba(197,160,89,0.08);transform:translateX(10px)}
    .badge-item.active{border-color:var(--gold-bright);background:rgba(197,160,89,0.15);box-shadow:-5px 0 20px rgba(197,160,89,0.2)}

    .icon-box{width:80px;height:80px;margin-right:20px;display:flex;justify-content:center;align-items:center;border:1px solid var(--gold);transform:rotate(45deg);transition:var(--transition)}
    .badge-item:hover .icon-box{transform:rotate(45deg) scale(1.1);border-color:var(--gold-bright)}
    .icon-inner{transform:rotate(-45deg);font-size:2rem;color:var(--gold)}

    .badge-text{display:flex;flex-direction:column}
    .badge-text span{font-family:'Cinzel', serif;font-size:1.4rem;letter-spacing:2px;color:var(--gold)}
    .badge-text small{font-size:0.75rem;color:var(--text-gray);text-transform:uppercase;letter-spacing:1px;margin-top:4px}

    .sidebar{flex:1.5;background:var(--card-bg);border-left:1px solid #222;display:flex;flex-direction:column;box-shadow:-10px 0 30px rgba(0,0,0,0.3)}
    .sidebar-content{padding:45px;overflow-y:auto;height:100%;scrollbar-width:thin;scrollbar-color:var(--gold) transparent}
    .sidebar h2{font-family:'Cinzel', serif;color:var(--gold-bright);margin:0;font-size:2.4rem;letter-spacing:4px}
    .realm-info-box{margin-top:25px;padding:20px;background:rgba(0,0,0,0.3);border-radius:8px;border:1px solid rgba(197,160,89,0.1)}
    .realm-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:30px}
    .meta-item b{display:block;font-family:'Cinzel',serif;color:var(--gold);font-size:0.8rem;margin-bottom:5px;text-transform:uppercase}
    .meta-item p{margin:0;font-size:1rem;color:#ddd}

    .house-section-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);margin:40px 0 20px 0;border-bottom:1px solid #333;padding-bottom:10px}
    .house-item{margin-bottom:15px;border:1px solid #222;background:#0d0d0f;border-radius:6px;transition:var(--transition)}
    .house-header{padding:20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:'Cinzel',serif;color:var(--gold);font-weight:bold;font-size:1.1rem}
    .house-body{max-height:0;overflow:hidden;transition:all .5s ease;background:#080809;padding:0 20px}
    .house-item.active .house-body{max-height:2000px;padding:20px;border-top:1px solid #222}

    .info-label{color:var(--gold);font-size:0.75rem;text-transform:uppercase;font-weight:bold;display:block;margin-top:15px;letter-spacing:1px}
    .info-content{font-size:0.95rem;color:#ccc;line-height:1.6;margin-top:4px}
    .empty-view{text-align:center;margin-top:45%;color:#555}

    @media (max-width:850px){
      #atlas-widget{flex-direction:column;height:auto}
      .badges-viewport{height:auto;padding:20px}
      .badge-item{max-width:100%;margin-bottom:10px}
      .sidebar{height:600px;border-left:none;border-top:1px solid #333}
    }
  </style>
</head>
<body>
  <div id="atlas-widget" role="application" aria-label="Atlas widget">
    <div class="badges-viewport" aria-label="Selector de reinos">
      <div class="badge-item" id="badge-auralus" role="button" tabindex="0" aria-pressed="false">
        <div class="icon-box"><div class="icon-inner">⚔</div></div>
        <div class="badge-text">
          <span>AURALÚS</span>
          <small>Tierras Altas y Bosques</small>
        </div>
      </div>

      <div class="badge-item" id="badge-nivalis" role="button" tabindex="0" aria-pressed="false">
        <div class="icon-box"><div class="icon-inner">⛩</div></div>
        <div class="badge-text">
          <span>NIVALIS</span>
          <small>Glaciares y Honor</small>
        </div>
      </div>

      <div class="badge-item" id="badge-coralum" role="button" tabindex="0" aria-pressed="false">
        <div class="icon-box"><div class="icon-inner">⚓</div></div>
        <div class="badge-text">
          <span>CORALUM</span>
          <small>Archipiélagos y Tormentas</small>
        </div>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-content" id="sidebar-ui">
        <div class="empty-view">
          <h3 style="font-family: Cinzel; letter-spacing: 2px;">Códice Imperial</h3>
          <p>Selecciona una insignia para revelar los anales del reino.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* Datos de ejemplo */
    const reinosData = {
      auralus: {
        nombre: "Auralús",
        clima: "Templado, Bosques de Bruma, Tierras Altas",
        cultura: "Inglesa, Escocesa y Alemana (Tradición Medieval)",
        historia: "El corazón político de Devenir. Un reino definido por sus densos bosques de robles plateados y sus inexpugnables castillos de piedra gris. Su gente valora la herencia, la ley y el linaje por encima de todo.",
        houses: [
          {
            nombre: "Casa Dravaryn",
            localizacion: "Stormveil (Castillo Velo de Tormenta)",
            raza: "Dragones Antiguos (Híbridos)",
            ideals: "Dominio, Sabiduría, Poder Silencioso",
            desc: "La casa más antigua del reino. Se dice que sus antepasados fueron los primeros en domar los vientos que azotan las cumbres del norte. Han gobernado con mano de hierro y guante de seda durante siglos.",
            descFisica: "Individuos de gran estatura, ojos que brillan con un tono oro fundido cuando se enfurecen y cabellos de color ceniza o blanco puro."
          },
          {
            nombre: "Casa Blackwood",
            localizacion: "Evertree (Bosque Eterno)",
            raza: "Humanos de las Tierras Altas",
            ideals: "Tenacidad, Resiliencia, Tradición",
            desc: "Guardianes de la frontera forestal. Expertos rastreadores y maestros de la arquería larga. Su lealtad a la corona es legendaria, aunque prefieren la soledad de sus bosques.",
            descFisica: "Complexión robusta, cabellos castaños o rojizos y ojos verdes como el musgo. Suelen vestir ropajes de cuero y pieles oscuras."
          }
        ]
      },
      nivalis: {
        nombre: "Nivalis",
        clima: "Gélido, Nieve Perpetua, Glaciares",
        cultura: "Asiática (Samurái y Misticismo)",
        historia: "Un reino de belleza mortal tallado en el hielo. La disciplina es el pilar de su sociedad, donde cada ciudadano conoce su lugar y su deber. Es famoso por sus templos sobre las nubes y sus ciudades subterráneas calientes.",
        houses: [
          {
            nombre: "Clan Kitsushiro",
            localizacion: "Kitashiro (Fortaleza del Norte)",
            raza: "Humanos del Norte / Sangre de Escarcha",
            ideals: "Honor, Lealtad Absoluta, Sacrificio",
            desc: "Una orden de guerreros-místicos que protegen las puertas de los glaciares. Creen que el frío purifica el alma y que la espada es una extensión del espíritu.",
            descFisica: "Rasgos afilados, piel clara, cabellos negros lacios y a menudo tatuajes de runas de hielo que brillan tenuemente en la oscuridad."
          }
        ]
      },
      coralum: {
        nombre: "Coralum",
        clima: "Marítimo, Tormentoso, Tropical",
        cultura: "Nórdica o Vikinga (Exploradores y Saqueadores)",
        historia: "Un archipiélago indomable donde solo los más fuertes sobreviven a las mareas. Sus habitantes son los mejores navegantes del mundo conocido, capaces de cruzar océanos que otros consideran suicidas.",
        houses: [
          {
            nombre: "Clan Skeldvar",
            localizacion: "Coralspire (Aguja de Coral)",
            raza: "Marineros Nórdicos",
            ideals: "Gloria en Combate, Libertad, Conquista",
            desc: "Nómadas del mar que solo tocan tierra para reabastecerse o celebrar victorias. Sus barcos son sus verdaderos hogares. Se rumorea que tienen pactos con las bestias de las profundidades.",
            descFisica: "Músculos desarrollados por el remo, piel curtida por la sal y el sol, barbas largas trenzadas y tatuajes que cuentan sus hazañas en el mar."
          }
        ]
      }
    };

    function toggleHouse(headerEl){
      const item = headerEl.closest('.house-item');
      if(!item) return;
      item.classList.toggle('active');
    }

    function selectRealm(id){
      if(!reinosData[id]) return;
      document.querySelectorAll('.badge-item').forEach(b=>{
        b.classList.remove('active');
        b.setAttribute('aria-pressed','false');
      });
      const badgeEl = document.getElementById('badge-' + id);
      if(badgeEl){
        badgeEl.classList.add('active');
        badgeEl.setAttribute('aria-pressed','true');
      }

      const data = reinosData[id];
      const ui = document.getElementById('sidebar-ui');

      const housesHTML = data.houses.map(h=>`
        <div class="house-item">
          <div class="house-header" role="button" tabindex="0">
            <span>✦ ${h.nombre}</span>
            <small>DETALLES</small>
          </div>
          <div class="house-body">
            <span class="info-label">Localización Principal</span>
            <div class="info-content">${h.localizacion}</div>

            <span class="info-label">Raza y Linaje</span>
            <div class="info-content">${h.raza}</div>

            <span class="info-label">Ideales y Código</span>
            <div class="info-content">${h.ideals}</div>

            <span class="info-label">Descripción Histórica</span>
            <div class="info-content">${h.desc}</div>

            <span class="info-label">Rasgos Físicos Distintivos</span>
            <div class="info-content">${h.descFisica}</div>
          </div>
        </div>`).join('');

      ui.innerHTML = `
        <h2>${data.nombre}</h2>
        <div class="realm-info-box">
          <div class="realm-meta-grid">
            <div class="meta-item"><b>Clima Dominante</b><p>${data.clima}</p></div>
            <div class="meta-item"><b>Influencia Cultural</b><p>${data.cultura}</p></div>
          </div>
          <b>Resumen del Reino</b>
          <p style="color:#aaa; line-height:1.6; font-size:0.95rem; margin-top:8px;">${data.historia}</p>
        </div>
        <div class="house-section-title">Grandes Linajes y Clanes</div>
        ${housesHTML}
      `;

      // animación suave de entrada
      ui.style.opacity = 0;
      ui.style.transform = "translateY(10px)";
      setTimeout(()=>{
        ui.style.transition = "all 0.6s ease";
        ui.style.opacity = 1;
        ui.style.transform = "translateY(0)";
      },40);
    }

    // Añadir handlers después de que DOM esté listo
    document.addEventListener('DOMContentLoaded', () => {
      const badgesViewport = document.querySelector('.badges-viewport');
      if(badgesViewport){
        badgesViewport.addEventListener('click', (ev)=>{
          const badge = ev.target.closest('.badge-item');
          if(!badge) return;
          const id = badge.id.replace(/^badge-/, '');
          selectRealm(id);
        });

        badgesViewport.addEventListener('keydown', (ev)=>{
          const badge = ev.target.closest && ev.target.closest('.badge-item');
          if(!badge) return;
          if(ev.key === 'Enter' || ev.key === ' '){
            ev.preventDefault();
            const id = badge.id.replace(/^badge-/, '');
            selectRealm(id);
          }
        });
      }

      const ui = document.getElementById('sidebar-ui');
      if(ui){
        ui.addEventListener('click', (ev)=>{
          const header = ev.target.closest('.house-header');
          if(!header) return;
          toggleHouse(header);
        });
        ui.addEventListener('keydown', (ev)=>{
          const header = ev.target.closest && ev.target.closest('.house-header');
          if(!header) return;
          if(ev.key === 'Enter' || ev.key === ' '){
            ev.preventDefault();
            toggleHouse(header);
          }
        });
      }

      // Selección por defecto (opcional)
      selectRealm('auralus');
    });
  </script>
</body>
</html>
