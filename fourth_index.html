<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glosario de Especies - D&D</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Fauna+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a44c;
            --dark-bg: #0f0f10;
            --panel-bg: #1e1e1f;
            --text-color: #e0d9c1;
            --accent: #c9a44c;
            --trait-bg: rgba(201, 164, 76, 0.05);
            --border-gold: rgba(201, 164, 76, 0.4);
        }

        * { box-sizing: border-box; }

        body {
            background: var(--dark-bg);
            color: var(--text-color);
            font-family: 'Fauna One', serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #encyclopedia-container {
            width: 100%;
            max-width: 950px;
            background: var(--panel-bg);
            border: 2px solid var(--gold);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, .8);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }

        .header {
            padding: 25px;
            border-bottom: 2px solid var(--gold);
            text-align: center;
            background: linear-gradient(to bottom, #1e1e1f, #131314);
        }

        .header h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            margin: 0;
            letter-spacing: 4px;
            font-size: 1.8rem;
        }

        .controls {
            padding: 20px;
            background: #151516;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 15px;
            border-bottom: 1px solid var(--border-gold);
        }

        input, select {
            background: #000;
            border: 1px solid var(--border-gold);
            color: var(--text-color);
            padding: 10px;
            border-radius: 4px;
            font-family: inherit;
            outline: none;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .species-list {
            width: 250px;
            border-right: 1px solid var(--border-gold);
            overflow-y: auto;
            background: #181819;
        }

        .species-item {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, .05);
            cursor: pointer;
            transition: .3s;
            display: flex;
            flex-direction: column;
        }

        .species-item:hover { background: rgba(201, 164, 76, .1); }
        .species-item.active { background: var(--gold); color: #000; }
        .species-item .name { font-family: 'Cinzel', serif; font-weight: bold; }
        .species-item .category { font-size: .7rem; text-transform: uppercase; opacity: .7; }

        .details-panel {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            background: #1e1e1f;
        }

        .detail-header { border-bottom: 1px solid var(--gold); margin-bottom: 15px; padding-bottom: 10px; }
        .detail-header h2 { font-family: 'Cinzel', serif; color: var(--gold); margin: 0; font-size: 2rem; }
        .subtitle { font-size: .9rem; font-style: italic; color: #aaa; }
        
        .subrace-selector { margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.4); border: 1px solid var(--border-gold); border-radius: 8px; }
        .subrace-selector label { display: block; font-size: 0.75rem; color: var(--gold); text-transform: uppercase; margin-bottom: 8px; font-weight: bold; letter-spacing: 1px; }
        .subrace-selector select { width: 100%; border-color: var(--gold); }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-box { background: rgba(0, 0, 0, .3); border: 1px solid var(--border-gold); padding: 10px; border-radius: 6px; }
        .stat-box label { display: block; font-size: .6rem; color: var(--gold); text-transform: uppercase; margin-bottom: 3px; }

        .section-title { font-family: 'Cinzel', serif; color: var(--gold); margin: 25px 0 12px; font-size: 1.2rem; border-left: 3px solid var(--gold); padding-left: 10px; }
        
        .trait-pill { 
            background: var(--trait-bg); 
            border: 1px solid var(--border-gold); 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            transition: 0.3s;
        }
        .trait-pill:hover { background: rgba(201, 164, 76, 0.1); }
        .trait-pill strong { color: var(--gold); font-family: 'Cinzel'; display: block; margin-bottom: 5px; font-size: 1rem; border-bottom: 1px solid rgba(201, 164, 76, 0.2); padding-bottom: 3px; }
        .trait-pill span { line-height: 1.5; font-size: 0.95rem; display: block; }

        .hidden { display: none; }

        @media(max-width: 700px) {
            .main-content { flex-direction: column; }
            .species-list { width: 100%; height: 200px; border-right: none; border-bottom: 1px solid var(--gold); }
        }
    </style>
</head>
<body>

<div id="encyclopedia-container">
    <div class="header"><h1>Glosario de Especies</h1></div>
    
    <div class="controls">
        <input type="text" id="search-input" placeholder="Buscar especie..." onkeyup="filterSpecies()">

                </div>

                </div>

            </div>
        </div>
    </div>
</div>

let currentSpecies = null;

function init() {
    speciesDatabase.sort((a, b) => a.name.localeCompare(b.name));
    renderList(speciesDatabase);
}

function renderList(list) {

        div.className = 'species-item';
        div.id = `item-${sp.id}`;
        div.innerHTML = `
            <span class="name">${sp.name}</span>
            <span class="category">${sp.category}</span>
        `;
        div.onclick = () => showSpecies(sp.id);
        listContainer.appendChild(div);
    });
}

function showSpecies(id) {
    const sp = speciesDatabase.find(s => s.id === id);
    if (!sp) return;

    currentSpecies = sp;
    document.getElementById('empty-state').classList.add('hidden');
    document.getElementById('content-display').classList.remove('hidden');
    document.querySelectorAll('.species-item').forEach(el => el.classList.remove('active'));
    document.getElementById(`item-${id}`).classList.add('active');

    document.getElementById('det-name').innerText = sp.name;
    document.getElementById('det-subtitle').innerText = sp.category;
    document.getElementById('det-desc').innerText = sp.description;

    renderSubraceSelector(sp);
    if (sp.subraces && sp.subraces.length > 0) {
        showSubrace(sp.subraces[0]);
    }
}

function renderSubraceSelector(sp) {
    const container = document.getElementById('subrace-container');
    if (!sp.subraces || sp.subraces.length <= 1) {
        container.classList.add('hidden');
        if(sp.subraces && sp.subraces.length === 1) showSubrace(sp.subraces[0]);
        return;
    }

    container.classList.remove('hidden');
    container.innerHTML = `
        <label>Subraza / Linaje Específico</label>
        <select id="subrace-select"></select>
    `;
    
    const select = document.getElementById('subrace-select');
    sp.subraces.forEach((sr, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = sr.name;
        select.appendChild(opt);
    });

    select.onchange = (e) => showSubrace(sp.subraces[e.target.value]);
}

function showSubrace(sr) {
    document.getElementById('det-type').innerText = sr.type;
    document.getElementById('det-size').innerText = sr.size;
    document.getElementById('det-speed').innerText = sr.speed;
    document.getElementById('det-langs').innerText = sr.languages;
    document.getElementById('det-physical').innerText = sr.physical;

    const traitsContainer = document.getElementById('det-traits');
    traitsContainer.innerHTML = sr.traits.map(t => `
        <div class="trait-pill">
            <strong>${t.title}</strong>
            <span>${t.text.replace(/\n/g, '<br>')}</span>
        </div>
    `).join('');
}

function filterSpecies() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const category = document.getElementById('category-filter').value;

    const filtered = speciesDatabase.filter(sp => {
        const matchesSearch = sp.name.toLowerCase().includes(search);
        const matchesCategory = category === 'all' || sp.category === category;
        return matchesSearch && matchesCategory;
    });

    renderList(filtered);
}

window.onload = init;
</script>
</body>
</html>
