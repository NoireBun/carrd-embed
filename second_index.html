<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glosario de Especies - D&D</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Fauna+One&display=swap" rel="stylesheet">
<style>
:root {
--gold:#c9a44c;
--dark-bg:#0f0f10;
--panel-bg:#1e1e1f;
--text-color:#e0d9c1;
--accent:#8847ff;
--border-gold:rgba(201,164,76,0.4);
}
*{box-sizing:border-box}
body{
background:var(--dark-bg);
color:var(--text-color);
font-family:'Fauna One',serif;
margin:0;
padding:20px;
display:flex;
justify-content:center;
}
#encyclopedia-container{
width:100%;
max-width:950px;
background:var(--panel-bg);
border:2px solid var(--gold);
border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,.8);
overflow:hidden;
display:flex;
flex-direction:column;
height:90vh;
}
.header{
padding:25px;
border-bottom:2px solid var(--gold);
text-align:center;
background:linear-gradient(to bottom,#1e1e1f,#131314);
}
.header h1{
font-family:'Cinzel',serif;
color:var(--gold);
margin:0;
letter-spacing:4px;
font-size:1.8rem;
}
.controls{
padding:20px;
background:#151516;
display:grid;
grid-template-columns:1fr auto;
gap:15px;
border-bottom:1px solid var(--border-gold);
}
input,select{
background:#000;
border:1px solid var(--border-gold);
color:var(--text-color);
padding:10px;
border-radius:4px;
font-family:inherit;
outline:none;
}
.main-content{
display:flex;
flex:1;
overflow:hidden;
}
.species-list{
width:250px;
border-right:1px solid var(--border-gold);
overflow-y:auto;
background:#181819;
}
.species-item{
padding:15px;
border-bottom:1px solid rgba(255,255,255,.05);
cursor:pointer;
transition:.3s;
display:flex;
flex-direction:column;
}
.species-item:hover{background:rgba(201,164,76,.1)}
.species-item.active{background:var(--gold);color:#000}
.species-item .name{font-family:'Cinzel',serif;font-weight:bold}
.species-item .category{font-size:.7rem;text-transform:uppercase;opacity:.7}
.details-panel{
flex:1;
overflow-y:auto;
padding:30px;
background:#1e1e1f;
}
.detail-header{border-bottom:1px solid var(--gold);margin-bottom:15px;padding-bottom:10px}
.detail-header h2{font-family:'Cinzel',serif;color:var(--gold);margin:0;font-size:2rem}
.subtitle{font-size:.9rem;font-style:italic;color:#aaa}
.subrace-selector{margin-top:10px}
.subrace-selector select{width:100%;margin-top:5px}
.stat-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
margin-bottom:20px;
}
.stat-box{background:rgba(0,0,0,.3);border:1px solid var(--border-gold);padding:10px;border-radius:6px}
.stat-box label{display:block;font-size:.6rem;color:var(--gold);text-transform:uppercase;margin-bottom:3px}
.section-title{font-family:'Cinzel',serif;color:var(--gold);margin:20px 0 10px;font-size:1.1rem}
.trait-pill{background:rgba(136,71,255,.1);border:1px solid var(--accent);padding:10px;border-radius:6px;margin-bottom:10px}
.trait-pill strong{color:var(--accent);font-family:'Cinzel';display:block;margin-bottom:3px}
.hidden{display:none}
@media(max-width:700px){
.main-content{flex-direction:column}
.species-list{width:100%;height:200px;border-right:none;border-bottom:1px solid var(--gold)}
}
</style>
</head>
<body>
<div id="encyclopedia-container">
<div class="header"><h1>Glosario de Especies</h1></div>
<div class="controls">
<input type="text" id="search-input" placeholder="Buscar especie..." onkeyup="filterSpecies()">
<select id="category-filter" onchange="filterSpecies()">
<option value="all">Todas las Categorías</option>
<option value="Anomalías">Anomalías</option>
<option value="Bestias">Bestias</option>
<option value="Acuáticos / Voladores">Acuáticos / Voladores</option>
<option value="Dragones">Dragones</option>
</select>
</div>
<div class="main-content">
<div class="species-list" id="species-list"></div>
<div class="details-panel" id="details-panel">
<div id="empty-state" style="text-align:center;margin-top:100px;opacity:.5">
<p>Selecciona una especie para ver sus detalles</p>
</div>
<div id="content-display" class="hidden">
<div class="detail-header">
<h2 id="det-name"></h2>
<div class="subtitle" id="det-subtitle"></div>
<div class="subrace-selector" id="subrace-container"></div>
</div>
<div class="stat-grid">
<div class="stat-box"><label>Tipo</label><span id="det-type"></span></div>
<div class="stat-box"><label>Tamaño</label><span id="det-size"></span></div>
<div class="stat-box"><label>Velocidad</label><span id="det-speed"></span></div>
<div class="stat-box"><label>Lenguajes</label><span id="det-langs"></span></div>
</div>
<div class="section-title">Descripción</div>
<p id="det-desc"></p>
<div class="section-title">Físico</div>
<p id="det-physical"></p>
<div class="section-title">Rasgos Raciales</div>
<div id="det-traits"></div>
</div>
</div>
</div>
</div>
<script>
const speciesDatabase=[
{

subraces:[
{

size:"Pequeña",
speed:"30 pies",
languages:"Common, Goblin",
physical:"Astutas, caderonas, se suelen ensuciar mucho y moldeadas por ruinas y sus hogares en cuevas. Les suele gustar robar oro y comer carne además de realizar intercambios con otras especies.",
traits:[
{title:"Darkvision",text:"Puedes ver en luz tenue dentro de 60 pies como si fuera luz brillante, y en oscuridad como si fuera luz tenue. En la oscuridad, solo distingues los colores como tonos de gris."},
{title:"Fey Ancestry",text:"Tienes ventaja en las tiradas de salvación que realices para evitar o terminar la condición encantada sobre ti."
{title:"Fury of the Small",text:"Cuando dañas a una criatura con un ataque o un conjuro, y la criatura es de un tamaño mayor que el tuyo, puedes hacer que el ataque o conjuro inflija daño adicional. El daño adicional es igual a tu bonificador por competencia. Puedes usar este rasgo un número de veces igual a tu bonificador por competencia, y recuperas todos los usos gastados al finalizar un descanso largo. No puedes usar este rasgo más de una vez por turno."},
{title:"Nimble Escape",text:"Puedes realizar la acción de Desengancharte o Esconderte como acción adicional en cada uno de tus turnos."}
]
},
{
name:"Dragonjaw",
type:"Humanoide / Dragon",
size:"Pequeña",
speed:"25 pies",
languages:"Common, Draconic, Goblin",
physical:"Bajas y robustas, con pelo espeso en la cabeza y pequeños cuernos similares a los de carneros o dragones. Estas goblins están moldeadas por la resistencia antes que por la agilidad en climas fríos. Son persistentes, tenaces y sorprendentemente duras para su tamaño.",
traits:[
{title:"Darkvision",text:"Puedes ver en luz tenue dentro de 60 pies como si fuera luz brillante, y en oscuridad como si fuera luz tenue. En la oscuridad, solo distingues los colores como tonos de gris."},
{title:"Cold Resistance",text:"Resistencia al daño por frío."},
{title:"Thick Fur",text:"Estás adaptada a climas gélidos. Ignoras los efectos de clima extremadamente frío, como se describe en las reglas de entorno."},
{title:"Fury of the Small",text:"Cuando dañas a una criatura con un ataque o un conjuro, y la criatura es de un tamaño mayor que el tuyo, puedes hacer que el ataque o conjuro inflija daño adicional. El daño adicional es igual a tu bonificador por competencia. Puedes usar este rasgo un número de veces igual a tu bonificador por competencia, y recuperas todos los usos gastados al finalizar un descanso largo. No puedes usar este rasgo más de una vez por turno."},
{title:"Natural Toughness",text:"Tu máximo de puntos de vida aumenta en 1 y aumenta nuevamente en 1 cada vez que subes de nivel."}
]
},
{

size:"Pequeña",

languages:"Common, +1 Elección",
physical:"Más agresivas, colmillos prominentes, desarrollando más musculo y deseando más el combate y la fuerza que el resto de Goblins de su tipo.",

{title:"Darkvision",text:"Puedes ver en luz tenue dentro de 60 pies como si fuera luz brillante, y en oscuridad como si fuera luz tenue. En la oscuridad, solo distingues los colores como tonos de gris."},
{title:"Fury of the Small",text:"Cuando dañas a una criatura con un ataque o un conjuro, y la criatura es de un tamaño mayor que el tuyo, puedes hacer que el ataque o conjuro inflija daño adicional. El daño adicional es igual a tu bonificador por competencia. Puedes usar este rasgo un número de veces igual a tu bonificador por competencia, y recuperas todos los usos gastados al finalizar un descanso largo. No puedes usar este rasgo más de una vez por turno."},
{title:"Relentless Fury",text:"Antes de realizar un ataque cuerpo a cuerpo o a distancia puedes usar dos usos de Fury of the Small para declarar un ataque agresivo, si impacta, puedes realizar el daño equivalente a dos usos de Fury of The Small o un Ataque Adicional.."},
{title:"Nimble Escape",text:"Puedes realizar la acción de Desengancharte o Esconderte como acción adicional en cada uno de tus turnos."}
]
},
{
name:"Shadefoot",
type:"Humanoide / Fey",

speed:"35 pies",

physical:"Silenciosas y escurridizas, adaptadas a la emboscada.",
traits:[
{title:"Darkvision",text:"Puedes ver en luz tenue dentro de 60 pies como si fuera luz brillante, y en oscuridad como si fuera luz tenue. En la oscuridad, solo distingues los colores como tonos de gris."},
{title:"Pickpocket",text:"Competencia en Juego de Manos."},
{title:"Unseen Skulker",text:"Eres experta en desaparecer en el momento justo. Cuando realizas la acción de Esconderte, puedes intentar ocultarte incluso si estás ligeramente oscurecida o parcialmente cubierta, siempre que no estés a plena vista. Además, moverte mientras estás oculta no revela tu posición si terminas tu movimiento en cobertura o en una zona oscurecida."}
{title:"Nimble Escape",text:"Puedes realizar la acción de Desengancharte o Esconderte como acción adicional en cada uno de tus turnos."}
]
id:"draconido",
name:"Dracónido",
category:"Dragones",
description:"Los dracónidos son los herederos más directos del legado dracónico. No son descendientes accidentales ni ecos fragmentados como los kobolds, sino criaturas nacidas de linajes dracónicos estables. Cuando Nox creó a los primeros dragones, algunos de esos seres adoptaron formas más cercanas al mundo material. De esas líneas emergieron los dracónidos: mortales, pero marcados por la esencia del dragón. Poseen la imponencia, la presencia y el orgullo característicos de sus ancestros. Aunque carecen del poder colosal de un dragón verdadero, su sangre conserva fragmentos de ese legado: aliento elemental, resistencia sobrenatural y una presencia difícil de ignorar.",
subraces:[
{
name:"Sangre de Hielo",
type:"Humanoide / Dragon",
size:"Pequeño o Mediano",
speed:"30 pies",
languages:"Common, Draconic",
physical:"Astutas, caderonas, se suelen ensuciar mucho y moldeadas por ruinas y sus hogares en cuevas. Les suele gustar robar oro y comer carne además de realizar intercambios con otras especies.",
traits:[
{title:"Darkvision",text:"Puedes ver en luz tenue dentro de 60 pies como si fuera luz brillante, y en oscuridad como si fuera luz tenue. En la oscuridad, solo distingues los colores como tonos de gris."},
{title:"Fey Ancestry",text:"Tienes ventaja en las tiradas de salvación que realices para evitar o terminar la condición encantada sobre ti."
{title:"Fury of the Small",text:"Cuando dañas a una criatura con un ataque o un conjuro, y la criatura es de un tamaño mayor que el tuyo, puedes hacer que el ataque o conjuro inflija daño adicional. El daño adicional es igual a tu bonificador por competencia. Puedes usar este rasgo un número de veces igual a tu bonificador por competencia, y recuperas todos los usos gastados al finalizar un descanso largo. No puedes usar este rasgo más de una vez por turno."},
{title:"Nimble Escape",text:"Puedes realizar la acción de Desengancharte o Esconderte como acción adicional en cada uno de tus turnos."}
]
]
}
]
}
];
let currentSpecies=null;
function init(){renderList(speciesDatabase)}
function renderList(list){
const listContainer=document.getElementById('species-list');
listContainer.innerHTML='';
list.forEach(sp=>{
const div=document.createElement('div');
div.className='species-item';
div.id=`item-${sp.id}`;
div.innerHTML=`<span class="name">${sp.name}</span><span class="category">${sp.category}</span>`;
div.onclick=()=>showSpecies(sp.id);
listContainer.appendChild(div);
});
}
function showSpecies(id){
const sp=speciesDatabase.find(s=>s.id===id);
if(!sp)return;
currentSpecies=sp;
document.getElementById('empty-state').classList.add('hidden');
document.getElementById('content-display').classList.remove('hidden');
document.querySelectorAll('.species-item').forEach(el=>el.classList.remove('active'));
document.getElementById(`item-${id}`).classList.add('active');
document.getElementById('det-name').innerText=sp.name;
document.getElementById('det-subtitle').innerText=sp.category;
renderSubraceSelector(sp);
showSubrace(sp.subraces[0]);
}
function renderSubraceSelector(sp){
const container=document.getElementById('subrace-container');
if(!sp.subraces||sp.subraces.length===0){container.innerHTML='';return}
container.innerHTML=`<label>Subraza</label><select id="subrace-select"></select>`;
const select=document.getElementById('subrace-select');
sp.subraces.forEach((sr,i)=>{
const opt=document.createElement('option');
opt.value=i;
opt.textContent=sr.name;
select.appendChild(opt);
});
select.onchange=(e)=>showSubrace(sp.subraces[e.target.value]);
}
function showSubrace(sr){
document.getElementById('det-type').innerText=sr.type;
document.getElementById('det-size').innerText=sr.size;
document.getElementById('det-speed').innerText=sr.speed;
document.getElementById('det-langs').innerText=sr.languages;
document.getElementById('det-desc').innerText=currentSpecies.description;
document.getElementById('det-physical').innerText=sr.physical;
const traitsContainer=document.getElementById('det-traits');
traitsContainer.innerHTML=sr.traits.map(t=>`<div class="trait-pill"><strong>${t.title}</strong><span>${t.text}</span></div>`).join('');
}
function filterSpecies(){
const search=document.getElementById('search-input').value.toLowerCase();
const category=document.getElementById('category-filter').value;
const filtered=speciesDatabase.filter(sp=>{
const matchesSearch=sp.name.toLowerCase().includes(search);
const matchesCategory=category==='all'||sp.category===category;
return matchesSearch&&matchesCategory;
});
renderList(filtered);
}
window.onload=init;
</script>
</body>
</html>
